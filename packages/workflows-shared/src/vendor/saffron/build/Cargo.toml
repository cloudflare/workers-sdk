[package]
name = "saffron-cron-wasm"
version = "0.0.0"
edition = "2021"
license = "BSD-3-Clause"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
saffron = { git = "https://github.com/cloudflare/saffron", rev = "90c2af861010484d17e80542651f0691b00446e7" }
chrono = { version = "0.4", default-features = false, features = ["alloc"] }
wasm-bindgen = "0.2"

[profile.release]
lto = true
opt-level = "s"
