name: New PR Review

on:
  pull_request:
    types: [opened]

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Check if PR author is Cloudflare org member
        run: |
          STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/cloudflare/members/${{ github.event.pull_request.user.login }} \
            --silent -i 2>/dev/null | head -1 | awk '{print $2}') || true
          if [ "$STATUS" != "204" ]; then
            echo "User ${{ github.event.pull_request.user.login }} is not a member of the Cloudflare organization"
            exit 1
          fi
          echo "User ${{ github.event.pull_request.user.login }} is a Cloudflare org member"
        env:
          GH_TOKEN: ${{ secrets.READ_ONLY_ORG_GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Load review prompt
        id: prompt
        run: |
          {
            echo 'value<<EOF'
            echo "You are reviewing PR #${{ github.event.pull_request.number }} on ${{ github.repository }}."
            echo ""
            cat .github/bonk_reviewer.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Run Bonk
        uses: ask-bonk/ask-bonk/github@24832587005550860c8ad13fd96519e731ca632a # main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
        with:
          model: "cloudflare-ai-gateway/anthropic/claude-opus-4-6"
          forks: "false"
          permissions: write
          opencode_version: "1.4.6" # pin to this version as newer versions are causing ProviderInitError issues
          prompt: ${{ steps.prompt.outputs.value }}
