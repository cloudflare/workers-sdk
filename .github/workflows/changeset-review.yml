name: Changeset Review

on:
  # Note: This won't run for PRs from forks (no access to secrets)
  # but will work for internal PRs from branches on the main repo
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".changeset/*.md"
      - "packages/**"
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review-changesets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review Changesets with Claude
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          claude_args: |
            --json-schema '{"type":"object","properties":{"passed":{"type":"boolean"}},"required":["passed"]}'
          prompt: |
            Review the changesets in this PR for the Cloudflare Workers SDK.

            ## Guidelines

            Read `.changeset/README.md` for the complete changeset guidelines.

            ## Key Points

            - Changesets describe **user-facing changes only** (for the CHANGELOG)
            - Internal refactors, implementation details, and code reorganization do NOT need changesets
            - Major versions are forbidden for wrangler
            - No h1/h2/h3 headers in changeset content (breaks formatting)

            ## PR Info

            Title: ${{ github.event.pull_request.title }}
            Description: ${{ github.event.pull_request.body }}

            ## Your Task

            1. List changeset files in `.changeset/` (excluding README.md)
            2. Read each changeset file to review its contents
            3. If needed, check what packages changed using `git diff --name-only origin/${{ github.base_ref }}`
            4. Validate changesets cover user-facing changes appropriately

            Set `passed` to false only for blocking issues (missing changeset for user-facing changes, wrong version type, forbidden major, very poor quality).

      - name: Fail if review did not pass
        if: ${{ fromJSON(steps.claude-review.outputs.structured_output).passed == false }}
        run: exit 1
