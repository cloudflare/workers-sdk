name: "Rerun Remote Tests (Privileged)"

# Privileged companion to rerun-remote-tests.yml.
#
# Runs after the "Rerun Remote Tests" trigger workflow completes. The
# workflow_run event always executes from the default branch with full
# permissions — this is what allows us to call the Actions API even when the
# original event (pull_request labeled/unlabeled) came from a fork PR, where
# the GITHUB_TOKEN would otherwise be read-only.
#
# Strategy: WORKFLOW-FILE LOOKUP
# -------------------------------
# The E2E workflows (e2e-wrangler.yml, e2e-vite.yml, c3-e2e.yml) are
# triggered by pull_request, which means their workflow runs are indexed by
# the PR head SHA. So we can find them directly via:
#
#   GET /actions/workflows/<filename>/runs?head_sha=<PR_HEAD>
#
# This is simpler and more robust than the check-name lookup strategy used
# in rerun-codeowners-privileged.yml. We use it here because:
#
#   1. pull_request-triggered runs ARE indexed by the PR head SHA (unlike
#      pull_request_target runs which use the base branch SHA).
#
#   2. The E2E workflows have matrix-expanded job names like
#      "Wrangler E2E (Linux, shard 1/4)" — these are dynamic and fragile
#      to hard-code. Workflow filenames are stable.
#
# If a run is in-progress, we cancel it first (the rerun endpoint only works
# on completed runs) and poll until cancellation finishes. Runs that haven't
# started yet are skipped because they will pick up the label change on their
# own when they start.
on:
  workflow_run:
    workflows: ["Rerun Remote Tests"]
    types: [completed]

permissions: {}

jobs:
  rerun-e2e:
    name: "Rerun E2E Tests"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: write
    steps:
      # The trigger workflow only uploads an artifact when a relevant label
      # (run-remote-tests or run-c3-frameworks-tests) was toggled. For any
      # other label the trigger job is skipped entirely and no artifact
      # exists. continue-on-error lets us exit cleanly in that case.
      - name: Download PR context
        id: download-context
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: pr-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-run E2E workflows
        if: steps.download-context.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          HEAD_SHA=$(cat head_sha.txt)
          WORKFLOW_TARGETS=$(cat workflow_targets.txt)

          for workflow in ${WORKFLOW_TARGETS}; do
            # Find the most recent run of this workflow at the PR head SHA.
            run_info=$(gh api "repos/${REPO}/actions/workflows/${workflow}/runs?head_sha=${HEAD_SHA}&per_page=1" \
              --jq '.workflow_runs[0] | "\(.id) \(.status)"' || true)

            run_id=$(echo "$run_info" | awk '{print $1}')
            status=$(echo "$run_info" | awk '{print $2}')

            if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
              echo "::warning::No run found for ${workflow} at SHA ${HEAD_SHA}"
              continue
            fi

            # Runs that haven't started yet will see the newly-added label
            # when they begin — no need to cancel and re-run them.
            if [ "$status" != "completed" ] && [ "$status" != "in_progress" ]; then
              echo "${workflow} run ${run_id} is ${status} — not yet started, skipping."
              continue
            fi

            # If the run is actively executing, the label check has already
            # evaluated (likely to the old value). Cancel it first — the
            # rerun endpoint only works on completed runs.
            if [ "$status" = "in_progress" ]; then
              echo "Cancelling in-progress ${workflow} run ${run_id}..."
              gh api "repos/${REPO}/actions/runs/${run_id}/cancel" --method POST || true

              # Cancellation is async; poll until the run reaches "completed".
              for i in $(seq 1 30); do
                current=$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq '.status')
                if [ "$current" = "completed" ]; then
                  echo "Run ${run_id} is now completed (cancelled)."
                  break
                fi
                echo "  Waiting for cancellation to finish (${i}/30, status: ${current})..."
                sleep 2
              done
            fi

            gh api "repos/${REPO}/actions/runs/${run_id}/rerun" --method POST \
              && echo "Re-triggered ${workflow} (run ${run_id})" \
              || echo "::warning::Failed to re-run ${workflow} (run ${run_id})"
          done
