name: "Rerun Remote Tests"

# Trigger: the "run-remote-tests" or "run-c3-frameworks-tests" label is added
# to or removed from a pull request.
#
# Goal: re-run the E2E workflows (e2e-wrangler.yml, e2e-vite.yml, c3-e2e.yml)
# so they pick up the label change and either pass or withhold the Cloudflare
# API token to the test steps. This avoids adding "labeled" as a trigger type
# to every E2E workflow (which would cause wasteful re-runs on unrelated label
# changes).
#
# Why a two-workflow design?
# -------------------------
# For fork PRs, pull_request gives a read-only GITHUB_TOKEN and no access to
# secrets, so this workflow CANNOT call the Actions API to re-run or cancel
# workflow runs. Instead it saves the PR context as an artifact and exits. The
# companion workflow (rerun-remote-tests-privileged.yml) is triggered by the
# workflow_run event when THIS workflow completes. workflow_run always runs
# from the default branch with full permissions, so it can perform the re-run
# even for fork PRs.
on:
  pull_request:
    types: [labeled, unlabeled]

permissions: {}

jobs:
  trigger:
    name: "Save PR Context"
    if: github.event.label.name == 'run-remote-tests' || github.event.label.name == 'run-c3-frameworks-tests'
    runs-on: ubuntu-latest
    steps:
      - name: Save PR context
        run: |
          echo "${{ github.event.pull_request.head.sha }}" > head_sha.txt

          # Record which workflows to re-run based on the label that changed.
          if [ "${{ github.event.label.name }}" = "run-remote-tests" ]; then
            echo "e2e-wrangler.yml e2e-vite.yml c3-e2e.yml" > workflow_targets.txt
          else
            echo "c3-e2e.yml" > workflow_targets.txt
          fi

      - name: Upload PR context
        uses: actions/upload-artifact@v4
        with:
          name: pr-context
          path: |
            head_sha.txt
            workflow_targets.txt
          retention-days: 1
