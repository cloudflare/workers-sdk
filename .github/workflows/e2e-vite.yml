name: Vite Plugin E2E

on:
  merge_group:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  e2e-vite-plugin-test:
    name: ${{ format('Vite Plugin E2E ({0}, shard {1}/2)', matrix.description, matrix.shard) }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}-${{ matrix.shard }}
      cancel-in-progress: ${{ github.head_ref != 'changeset-release/main' }}
    timeout-minutes: 60
    # Vite Plugin E2E (Windows) was the PR-to-green critical path at ~797s.
    # Splitting 9 e2e test files into 2 shards via Vitest --shard=i/n halves
    # the worst cell to ~400s. Each shard runs its own global setup (mock npm
    # registry + temp dir) independently.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        shard: [1, 2]
        include:
          - os: macos-latest
            description: macOS
          - os: ubuntu-latest
            description: Linux
          - os: windows-latest
            description: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: changes
        with:
          filters: |
            everything_but_markdown:
              - '!**/*.md'

      - name: Check if remote tests should run
        id: check-remote
        uses: ./.github/actions/check-remote-tests

      - name: Install Dependencies
        if: steps.changes.outputs.everything_but_markdown == 'true'
        uses: ./.github/actions/install-dependencies
        with:
          turbo-api: ${{ secrets.TURBO_API }}
          turbo-team: ${{ secrets.TURBO_TEAM }}
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-signature: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

      - name: Bump package versions
        if: steps.changes.outputs.everything_but_markdown == 'true'
        run: node .github/changeset-version.js
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run Vite plugin E2E tests
        if: steps.changes.outputs.everything_but_markdown == 'true'
        run: pnpm test:e2e -F @cloudflare/vite-plugin --log-order=stream -- --shard=${{ matrix.shard }}/2
        timeout-minutes: 20
        env:
          NODE_DEBUG: "vite-plugin:test"
          # The remote-binding tests need to connect to Cloudflare
          CLOUDFLARE_API_TOKEN: ${{ steps.check-remote.outputs.run-remote == 'true' && secrets.TEST_CLOUDFLARE_API_TOKEN || '' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.check-remote.outputs.run-remote == 'true' && secrets.TEST_CLOUDFLARE_ACCOUNT_ID || '' }}
          NODE_OPTIONS: "--max_old_space_size=8192"
          CI_OS: ${{ matrix.os }}

      - name: Upload turbo logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-runs-${{ matrix.os }}-shard-${{ matrix.shard }}
          path: .turbo/runs

  # ---------------------------------------------------------------------
  # Backwards-compatibility status-check aliases.
  #
  # The matrix above added a `shard` axis, renaming jobs from
  # `Vite Plugin E2E (<OS>)` to `Vite Plugin E2E (<OS>, shard {1,2}/2)`.
  # Branch protection on `main` may still reference the old names.
  #
  # These three alias jobs report under the OLD names and depend on the
  # entire `e2e-vite-plugin-test` matrix. If any matrix cell fails or is
  # cancelled, every alias fails; if the whole matrix is skipped
  # (markdown-only PR), every alias passes.
  #
  # Remove these aliases once branch protection is updated to reference
  # the new sharded check names.
  # ---------------------------------------------------------------------
  alias-vite-plugin-e2e-linux:
    name: "Vite Plugin E2E (Linux)"
    needs: e2e-vite-plugin-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.e2e-vite-plugin-test.result }}" = "failure" ] || [ "${{ needs.e2e-vite-plugin-test.result }}" = "cancelled" ]; then
            echo "Vite Plugin E2E matrix did not succeed (result=${{ needs.e2e-vite-plugin-test.result }})"
            exit 1
          fi

  alias-vite-plugin-e2e-macos:
    name: "Vite Plugin E2E (macOS)"
    needs: e2e-vite-plugin-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.e2e-vite-plugin-test.result }}" = "failure" ] || [ "${{ needs.e2e-vite-plugin-test.result }}" = "cancelled" ]; then
            echo "Vite Plugin E2E matrix did not succeed (result=${{ needs.e2e-vite-plugin-test.result }})"
            exit 1
          fi

  alias-vite-plugin-e2e-windows:
    name: "Vite Plugin E2E (Windows)"
    needs: e2e-vite-plugin-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        run: |
          if [ "${{ needs.e2e-vite-plugin-test.result }}" = "failure" ] || [ "${{ needs.e2e-vite-plugin-test.result }}" = "cancelled" ]; then
            echo "Vite Plugin E2E matrix did not succeed (result=${{ needs.e2e-vite-plugin-test.result }})"
            exit 1
          fi
