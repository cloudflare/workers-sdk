name: "Install Dependencies"
description: "Install dependencies, fetching from cache when possible"
inputs:
  # We run all jobs on Node.js 22 by default, as this is the most stable and supported version right now.
  node-version:
    description: the version of Node.js to install
    default: 22
  turbo-api:
    description: the api URL for connecting to the turbo remote cache
  turbo-team:
    description: the team identifier for connecting to the turbo remote cache
  turbo-token:
    description: the api token for connecting to the turbo remote cache
  turbo-signature:
    description: the cache signature key for connecting to the turbo remote cache
runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

    - name: Install Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
        registry-url: "https://registry.npmjs.org"

    # Enable node compile cache (effective for Node 22+)
    # See https://nodejs.org/docs/v24.11.1/api/module.html#module-compile-cache
    - name: Enable Node Compile Cache
      shell: bash
      run: echo "NODE_COMPILE_CACHE=$HOME/.node_compile_cache" >> $GITHUB_ENV

    - name: "Configure turbo repo cache environment variables"
      if: inputs.turbo-api
      shell: bash
      run: |
        touch .env
        echo TURBO_API=${{ inputs.turbo-api }} >> .env
        echo TURBO_TEAM=${{ inputs.turbo-team }} >> .env
        echo TURBO_TOKEN=${{ inputs.turbo-token }} >> .env
        echo TURBO_REMOTE_CACHE_SIGNATURE_KEY=${{ inputs.turbo-signature }} >> .env
        echo TURBO_ENV_MODE=loose >> .env

    - name: Install NPM Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: "[DEBUG] pnpm config leak investigation"
      shell: bash
      run: |
        echo "=== pnpm version ==="
        pnpm --version
        echo ""
        echo "=== which pnpx ==="
        which pnpx
        echo ""
        echo "=== pnpm config from workspace CWD ==="
        pnpm config list --json | grep -E 'minimum|release|exclude' || echo "(none)"
        echo ""
        echo "=== pnpm config from /tmp CWD ==="
        cd /tmp && pnpm config list --json | grep -E 'minimum|release|exclude' || echo "(none)"
        cd -
        echo ""
        echo "=== global config dir contents ==="
        ls -la ~/.config/pnpm/ 2>/dev/null || echo "(no ~/.config/pnpm)"
        cat ~/.config/pnpm/config.yaml 2>/dev/null || echo "(no config.yaml)"
        cat ~/.config/pnpm/rc 2>/dev/null || echo "(no rc)"
        echo ""
        echo "=== PNPM env vars ==="
        env | grep -iE 'pnpm|npm_config' | sort || echo "(none)"
        echo ""
        echo "=== pnpm dlx test from /tmp ==="
        cd /tmp && pnpm dlx is-odd@3.0.1 --help 2>&1 | head -5 || echo "dlx failed"
        cd -
